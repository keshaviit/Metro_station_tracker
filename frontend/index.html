<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/metro-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F1117" />
    <meta name="description" content="Delhi Metro Tracker — Real-time metro navigation with BFS routing, live GPS tracking, and smart station prediction." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Metro Tracker" />

    <!-- Open Graph -->
    <meta property="og:title" content="Delhi Metro Tracker" />
    <meta property="og:description" content="Real-time metro navigation with BFS shortest path, live GPS, and smart predictions" />
    <meta property="og:type" content="website" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Google AdSense Verification -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3885362560418002"
     crossorigin="anonymous"></script>

    <!-- Google Identity Services (GIS) for Web Authentication -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <title>Delhi Metro Tracker — Real-time Navigation</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      // Do not register service worker inside native apps to prevent asset caching issues
      if ('serviceWorker' in navigator && !window.location.href.startsWith('capacitor://') && window.location.hostname !== 'localhost') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
