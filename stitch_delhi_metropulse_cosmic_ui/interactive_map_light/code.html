<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background-color: #fcf8ff;

            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);

<body class="bg-background text-on-background min-h-screen font-body-lg overflow-hidden select-none">

<svg class="w-full h-full p-lg" preserveaspectratio="xMidYMid meet" viewbox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">

<!-- Transit Lines -->
<!-- Blue Line -->
<path class="line-blue" d="M100 300 L300 300 L400 200 L600 200" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="8"></path>
<!-- Red Line -->
<path class="line-red" d="M400 50 L400 550" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="8"></path>
<!-- Yellow Line -->
<path class="line-yellow" d="M100 450 L400 300 L700 300" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="8"></path>
<!-- Stations -->
<!-- Interchange: Rajiv Chowk (Intersection of all or main) -->
<g class="cursor-pointer" onclick="toggleSheet()">
<circle 300"="" cx="400" fill="white" r="12" stroke="#1b1b23" stroke-width="3"></circle>
<circle 300"="" cx="400" fill="#4648d4" r="6"></circle>
<text class="font-label-md text-[14px] fill-on-background font-bold" x="415" y="305">Rajiv Chowk</text>
</g>
<!-- Regular Stations -->
<circle cx="100" cy="300" fill="white" r="6" stroke="#2563eb" stroke-width="2"></circle>
<circle cx="600" cy="200" fill="white" r="6" stroke="#2563eb" stroke-width="2"></circle>
<circle cx="400" cy="50" fill="white" r="6" stroke="#e11d48" stroke-width="2"></circle>
<circle cx="400" cy="550" fill="white" r="6" stroke="#e11d48" stroke-width="2"></circle>
<circle cx="700" cy="300" fill="white" r="6" stroke="#facc15" stroke-width="2"></circle>

<!-- Floating Action Controls -->

</button>
<button class="w-12 h-12 rounded-xl bg-surface/90 backdrop-blur-md shadow-lg border border-outline-variant/30 flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-all active:scale-90">

<script>
        const sheet = document.getElementById('station-sheet');
        let isCollapsed = false;

        function toggleSheet() {
            isCollapsed = !isCollapsed;
            if (isCollapsed) {
                sheet.classList.add('collapsed');
            } else {
                sheet.classList.remove('collapsed');
            }
        }

        // Initialize collapsed on small screens
        if (window.innerWidth < 768) {
            // toggleSheet(); // Optional: uncomment if you want it collapsed by default
        }

        // Simple zoom/pan interaction mock
        const container = document.getElementById('map-container');
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX - container.offsetLeft;
            startY = e.pageY - container.offsetTop;
            // Map movement logic here would translate SVG
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Small interactivity for transit feeling
        document.querySelectorAll('circle').forEach(circle => {
            circle.addEventListener('mouseenter', () => {
                circle.setAttribute('r', (parseInt(circle.getAttribute('r')) + 2).toString());
            });
            circle.addEventListener('mouseleave', () => {
                circle.setAttribute('r', (parseInt(circle.getAttribute('r')) - 2).toString());
            });
        });
    </script>
